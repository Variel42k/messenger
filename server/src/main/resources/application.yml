server:
  port: 8080

spring:
  application:
    name: messenger-server
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:messenger}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

file:
  upload:
    path: ${FILE_UPLOAD_PATH:uploads/}
    max-size-bytes: ${FILE_UPLOAD_MAX_SIZE_BYTES:104857600}

storage:
  provider: ${STORAGE_PROVIDER:disk}
  disk:
    path: ${STORAGE_DISK_PATH:${FILE_UPLOAD_PATH:uploads/}}

jwt:
  secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnlyMustBe256Bits!!}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000} # 15 minutes in ms
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000} # 7 days in ms

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:4566}
  access-key: ${S3_ACCESS_KEY:test}
  secret-key: ${S3_SECRET_KEY:test}
  bucket-name: ${S3_BUCKET_NAME:messenger-files}
  region: ${S3_REGION:us-east-1}
  path-style-access-enabled: ${S3_PATH_STYLE_ACCESS_ENABLED:true}
  auto-create-bucket: ${S3_AUTO_CREATE_BUCKET:true}

app:
  ldap:
    enabled: ${LDAP_ENABLED:false}
    url: ${LDAP_URL:#{null}}
    base-dn: ${LDAP_BASE_DN:#{null}}
    user-dn-pattern: ${LDAP_USER_DN_PATTERN:#{null}}
    manager-dn: ${LDAP_MANAGER_DN:#{null}}
    manager-password: ${LDAP_MANAGER_PASSWORD:#{null}}
  oidc:
    state-ttl-seconds: ${OIDC_STATE_TTL_SECONDS:600}

logging:
  level:
    com.messenger: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/messenger.log

management:
  health:
    ldap:
      enabled: ${LDAP_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    git:
      mode: simple
  metrics:
    export:
      prometheus:
        enabled: true

websocket:
  allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:8080,http://localhost:4200}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:messenger}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  flyway:
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}

jwt:
  secret: ${JWT_SECRET}

storage:
  provider: ${STORAGE_PROVIDER}

s3:
  endpoint: ${S3_ENDPOINT}
  access-key: ${S3_ACCESS_KEY}
  secret-key: ${S3_SECRET_KEY}
  bucket-name: ${S3_BUCKET_NAME}
  region: ${S3_REGION:us-east-1}
  path-style-access-enabled: ${S3_PATH_STYLE_ACCESS_ENABLED:false}
  auto-create-bucket: ${S3_AUTO_CREATE_BUCKET:false}

logging:
  level:
    com.messenger: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

jwt:
  secret: testSecretKeyForTestingOnlyMustBe256Bits!!
  access-token-expiration: 300000 # 5 minutes for testing
  refresh-token-expiration: 600000 # 10 minutes for testing
