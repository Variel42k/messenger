<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger Shapes Only</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    :root {
      --bg: #d0d3d6;
      --nav: #24394e;
      --nav-soft: #3d5f7b;
      --button: #3590cb;
      --card: #e6e6e7;
      --field: #f0f0f1;
      --field-border: #d2d5d8;
      --muted: #c3c7cb;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    .frame {
      width: min(1540px, calc(100vw - 16px));
      min-height: calc(100vh - 16px);
      margin: 8px auto;
      background: var(--bg);
      border: 1px solid #c7ccd0;
      position: relative;
      overflow: hidden;
    }

    .topbar {
      height: 74px;
      background: var(--nav);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .brand {
      width: 190px;
      height: 34px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 6px;
      opacity: 0.92;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ctl {
      height: 34px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: var(--nav-soft);
    }

    .ctl.wide { width: 98px; }
    .ctl.mid  { width: 68px; }
    .ctl.small{ width: 62px; }

    .ctl.active {
      background: var(--button);
      border-color: transparent;
    }

    .login-card {
      width: 500px;
      height: 430px;
      background: var(--card);
      border-radius: 8px;
      box-shadow: var(--shadow);
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      padding: 36px;
    }

    .title-block {
      width: 122px;
      height: 36px;
      background: #2e3e4f;
      opacity: 0.95;
      border-radius: 8px;
      margin: 0 auto 28px;
    }

    .label {
      width: 110px;
      height: 16px;
      border-radius: 4px;
      background: #2f465a;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .input {
      width: 100%;
      height: 44px;
      border-radius: 4px;
      border: 1px solid var(--field-border);
      background: var(--field);
      margin-bottom: 18px;
    }

    .submit {
      width: 100%;
      height: 46px;
      border-radius: 4px;
      background: var(--button);
      margin-top: 6px;
      margin-bottom: 30px;
    }

    .meta-line {
      width: 72%;
      height: 12px;
      border-radius: 4px;
      background: var(--muted);
      margin-bottom: 8px;
      opacity: 0.95;
    }

    .meta-line.short { width: 60%; }

    @media (max-width: 980px) {
      .frame {
        width: calc(100vw - 8px);
        min-height: calc(100vh - 8px);
        margin: 4px auto;
      }
      .login-card {
        width: min(500px, calc(100vw - 64px));
      }
      .brand {
        width: 140px;
      }
      .ctl.wide { width: 78px; }
      .ctl.mid, .ctl.small { width: 52px; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="topbar">
      <div class="brand"></div>
      <div class="controls">
        <div class="ctl wide"></div>
        <div class="ctl mid active"></div>
        <div class="ctl small"></div>
      </div>
    </div>

    <div class="login-card">
      <div class="title-block"></div>
      <div class="label"></div>
      <div class="input"></div>
      <div class="label"></div>
      <div class="input"></div>
      <div class="submit"></div>
      <div class="meta-line"></div>
      <div class="meta-line"></div>
      <div class="meta-line short"></div>
    </div>
  </div>
</body>
</html>
