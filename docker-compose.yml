services:
  postgres:
    image: postgres:15
    container_name: messenger-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-messenger}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - messenger-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: messenger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - messenger-network
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.8.1
    container_name: messenger-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - messenger-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: messenger-server
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - localstack
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      STORAGE_DISK_PATH: ${STORAGE_DISK_PATH:-/data/uploads}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localstack:4566}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-test}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-test}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-messenger-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PATH_STYLE_ACCESS_ENABLED: ${S3_PATH_STYLE_ACCESS_ENABLED:-true}
      S3_AUTO_CREATE_BUCKET: ${S3_AUTO_CREATE_BUCKET:-true}
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForDevelopmentOnlyMustBe256Bits!!}
    volumes:
      - files_data:/data/uploads
    networks:
      - messenger-network
    restart: unless-stopped

  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: messenger-web-client
    ports:
      - "3001:3000"
    depends_on:
      - server
    networks:
      - messenger-network
    restart: unless-stopped
    environment:
      - NODE_ENV=development

networks:
  messenger-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  localstack_data:
  files_data:
