services:
  postgres:
    image: postgres:15
    container_name: messenger-postgres
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - messenger-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: messenger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - messenger-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: messenger-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - messenger-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: messenger-server
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: messenger-files
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForDevelopmentOnly}
    networks:
      - messenger-network
    restart: unless-stopped

  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: messenger-web-client
    ports:
      - "3001:3000"
    depends_on:
      - server
    networks:
      - messenger-network
    restart: unless-stopped
    environment:
      - NODE_ENV=development

  # client:
  #   build:
  #     context: ./client
  #     dockerfile: Dockerfile
  #   container_name: messenger-client
  #   depends_on:
  #     - server
  #   networks:
  #     - messenger-network
  #   restart: unless-stopped
  #   environment:
  #     - SERVER_URL=http://server:8080

networks:
  messenger-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data: