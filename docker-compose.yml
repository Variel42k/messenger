services:
  postgres:
    image: postgres:15
    container_name: messenger-postgres
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - messenger-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: messenger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - messenger-network
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: messenger-rustfs
    environment:
      RUSTFS_USER: rustfsadmin
      RUSTFS_PASSWORD: rustfsadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    command: server /data --console-address ":9001"
    networks:
      - messenger-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: messenger-server
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - rustfs
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      RUSTFS_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_BUCKET_NAME: messenger-files
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForDevelopmentOnly}
    networks:
      - messenger-network
    restart: unless-stopped

networks:
  messenger-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data: